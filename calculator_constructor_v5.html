
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);}
input,select,textarea{font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);width:100%;}
input[type=checkbox]{width:15px;height:15px;flex-shrink:0;cursor:pointer;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--color-border-primary);}
.btn{font-size:12px;padding:5px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.btn:hover{background:var(--color-background-secondary);}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);}
.btn-primary:hover{opacity:0.82;background:var(--color-text-primary);}
.btn-sm{padding:3px 8px;font-size:11px;}
.btn-danger{color:var(--color-text-danger);border-color:transparent;}
.btn-danger:hover{background:var(--color-background-danger);}
.btn-ghost{border-color:transparent;color:var(--color-text-secondary);}
.btn-ghost:hover{color:var(--color-text-primary);background:var(--color-background-secondary);}
.btn-success{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success);}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.6rem;}
.lbl{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:block;}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.tag-info{background:var(--color-background-info);color:var(--color-text-info);}
.tag-success{background:var(--color-background-success);color:var(--color-text-success);}
.tag-warn{background:var(--color-background-warning);color:var(--color-text-warning);}
.tag-gray{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);}
.tag-purple{background:#EEEDFE;color:#3C3489;}
.tag-teal{background:#E1F5EE;color:#0F6E56;}
.tag-coral{background:#FAECE7;color:#993C1D;}
@media(prefers-color-scheme:dark){
  .tag-purple{background:#26215C;color:#AFA9EC;}
  .tag-teal{background:#04342C;color:#5DCAA5;}
  .tag-coral{background:#4A1B0C;color:#F0997B;}
}
.block{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:6px;}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:8px 0;}
.mono{font-family:var(--font-mono);font-size:12px;}
.json-out{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);white-space:pre-wrap;word-break:break-all;border:0.5px solid var(--color-border-tertiary);max-height:200px;overflow-y:auto;}
.tabs{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:1rem;}
.tab{flex:1;padding:8px 6px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--color-text-secondary);}
.tab.active{background:var(--color-text-primary);color:var(--color-background-primary);}
.tab:not(.active):hover{background:var(--color-background-secondary);}
.save-row{display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary);}
.rule-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.scope-pill{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:99px;background:#EEEDFE;color:#3C3489;margin:2px;}
@media(prefers-color-scheme:dark){.scope-pill{background:#26215C;color:#AFA9EC;}}
.add-menu{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 2px;}
.field-row{display:grid;gap:6px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:1fr 1fr 1fr 80px;}
.flbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;}

/* preview styles */
.p-section{margin-bottom:1.25rem;}
.p-heading{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary);}
.p-field{margin-bottom:10px;}
.p-field label{display:block;font-size:13px;font-weight:500;margin-bottom:4px;}
.p-field .hint{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;}
.p-checkbox{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);}
.p-checkbox:hover{background:var(--color-background-secondary);}
.p-checkbox input{width:15px;height:15px;}
.p-checkbox label{font-size:13px;cursor:pointer;margin:0;}
.p-note{padding:10px 12px;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:10px;border-left:3px solid;}
.p-note-info{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);}
.p-note-warn{background:var(--color-background-warning);color:var(--color-text-warning);border-color:var(--color-border-warning);}
.p-note-success{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success);}
.p-note-tip{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;}
@media(prefers-color-scheme:dark){.p-note-tip{background:#26215C;color:#AFA9EC;border-color:#534AB7;}}
.result-box{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-top:1rem;text-align:center;}
.result-steps{margin-top:10px;text-align:left;}
</style>

<h2 class="sr-only">Конструктор калькулятора с полями, условиями и превью</h2>
<div style="padding:.75rem 0;" id="app">
  <div class="tabs">
    <button class="tab active" onclick="go('builder')">Конструктор</button>
    <button class="tab" onclick="go('preview')">Превью</button>
    <button class="tab" onclick="go('json')">JSON / API</button>
  </div>
  <div id="v-builder"></div>
  <div id="v-preview" style="display:none"></div>
  <div id="v-json" style="display:none"></div>
</div>

<script>
let uid=300;const nid=()=>'u'+(uid++);
let curTab='builder';

let meta={name:'Плоттерная резка',desc:'Расчёт стоимости изделия'};

// fields: array of field objects sorted by position
// types: heading | input | checkbox | select | text | divider
let fields=[
  {id:nid(),ftype:'heading',label:'Материал'},
  {id:nid(),ftype:'select',label:'Материал',alias:'MAT',hint:'',required:true,options:[
    {id:nid(),label:'Оракал с печатью',value:'1'},
    {id:nid(),label:'Простая плёнка',value:'0.8'},
  ]},
  {id:nid(),ftype:'heading',label:'Размер'},
  {id:nid(),ftype:'input',label:'Ширина (мм)',alias:'W',itype:'number',placeholder:'Ширина',hint:'',required:true},
  {id:nid(),ftype:'input',label:'Высота (мм)',alias:'H',itype:'number',placeholder:'Высота',hint:'',required:true},
  {id:nid(),ftype:'input',label:'Количество (шт)',alias:'V',itype:'number',placeholder:'Количество',hint:'',required:true},
  {id:nid(),ftype:'heading',label:'Сложность'},
  {id:nid(),ftype:'checkbox',label:'Сложная форма',alias:'COMPLEX',value:'0.2',hint:'Доп. коэффициент',checked:false},
  {id:nid(),ftype:'text',ttype:'warn',content:'Не берём в резку макеты с толщиной линий менее 2мм'},
];

let consts=[
  {id:nid(),name:'Базовая цена',alias:'BASE',value:5},
];

// chain: all formulas execute, result = last saveAs or last formula result
let chain=[
  {id:nid(),type:'condition',logic:'AND',rules:[{id:nid(),var:'V',op:'<=',val:'9'}],formula:'(W*H/1000000)*BASE*MAT*V',saveAs:'PRICE'},
  {id:nid(),type:'condition',logic:'AND',rules:[{id:nid(),var:'V',op:'>=',val:'10'}],formula:'(W*H/1000000)*BASE*MAT*V*0.9',saveAs:'PRICE'},
  {id:nid(),type:'formula',formula:'PRICE+(PRICE*COMPLEX)',saveAs:'ИТОГО'},
];

function go(t){
  curTab=t;collect();
  ['builder','preview','json'].forEach(n=>document.getElementById('v-'+n).style.display=n===t?'block':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['builder','preview','json'][i]===t));
  if(t==='preview')renderPreview();
  if(t==='json')renderJson();
}

// ─── collect ───
function collect(){
  const n=document.getElementById('m-name'),d=document.getElementById('m-desc');
  if(n)meta.name=n.value;if(d)meta.desc=d.value;
  consts.forEach(c=>{
    const n2=document.getElementById('cn_'+c.id),a=document.getElementById('ca_'+c.id),v=document.getElementById('cv_'+c.id);
    if(n2)c.name=n2.value;if(a)c.alias=a.value;if(v)c.value=parseFloat(v.value)||0;
  });
  fields.forEach(f=>{
    if(f.ftype==='heading'){const l=document.getElementById('f_'+f.id);if(l)f.label=l.value;}
    else if(f.ftype==='input'){
      const l=document.getElementById('fl_'+f.id),a=document.getElementById('fa_'+f.id),
            p=document.getElementById('fp_'+f.id),h=document.getElementById('fh_'+f.id),
            t=document.getElementById('ft_'+f.id);
      if(l)f.label=l.value;if(a)f.alias=a.value;if(p)f.placeholder=p.value;if(h)f.hint=h.value;if(t)f.itype=t.value;
    } else if(f.ftype==='checkbox'){
      const l=document.getElementById('fl_'+f.id),a=document.getElementById('fa_'+f.id),
            v=document.getElementById('fv_'+f.id),h=document.getElementById('fh_'+f.id);
      if(l)f.label=l.value;if(a)f.alias=a.value;if(v)f.value=v.value;if(h)f.hint=h.value;
    } else if(f.ftype==='select'){
      const l=document.getElementById('fl_'+f.id),a=document.getElementById('fa_'+f.id),
            h=document.getElementById('fh_'+f.id);
      if(l)f.label=l.value;if(a)f.alias=a.value;if(h)f.hint=h.value;
      f.options.forEach(o=>{
        const ol=document.getElementById('ol_'+o.id),ov=document.getElementById('ov_'+o.id);
        if(ol)o.label=ol.value;if(ov)o.value=ov.value;
      });
    } else if(f.ftype==='text'){
      const c=document.getElementById('fc_'+f.id),t=document.getElementById('ftt_'+f.id);
      if(c)f.content=c.value;if(t)f.ttype=t.value;
    }
  });
  chain.forEach(b=>{
    if(b.type==='condition'){
      const lg=document.getElementById('lg_'+b.id);if(lg)b.logic=lg.value;
      b.rules.forEach(r=>{
        const rv=document.getElementById('rv_'+r.id),ro=document.getElementById('ro_'+r.id),rt=document.getElementById('rt_'+r.id);
        if(rv)r.var=rv.value;if(ro)r.op=ro.value;if(rt)r.val=rt.value;
      });
    }
    const f=document.getElementById('bf_'+b.id),s=document.getElementById('sa_'+b.id);
    if(f)b.formula=f.value;if(s)b.saveAs=s.value.trim();
  });
}

// ─── aliases ───
function allAliases(beforeChainIdx){
  const list=[];
  fields.forEach(f=>{
    if(f.ftype==='input'&&f.alias)list.push({alias:f.alias,lbl:f.label,type:'input'});
    if(f.ftype==='checkbox'&&f.alias)list.push({alias:f.alias,lbl:f.label,type:'checkbox'});
    if(f.ftype==='select'&&f.alias)list.push({alias:f.alias,lbl:f.label,type:'select'});
  });
  consts.forEach(c=>{if(c.alias)list.push({alias:c.alias,lbl:c.name,type:'const'});});
  chain.slice(0,beforeChainIdx).forEach(b=>{if(b.saveAs)list.push({alias:b.saveAs,lbl:b.saveAs,type:'computed'});});
  return list;
}
function aliasOpts(sel,bi){
  return '<option value="">—</option>'+allAliases(bi).map(a=>`<option value="${a.alias}"${a.alias===sel?' selected':''}>${{input:'[инп]',checkbox:'[чек]',select:'[сел]',const:'[кон]',computed:'[выч]'}[a.type]} ${a.alias}</option>`).join('');
}

// ─── eval ───
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function evalF(formula,scope){
  try{
    let e=formula;
    Object.entries(scope).sort((a,b)=>b[0].length-a[0].length).forEach(([k,v])=>{
      e=e.replace(new RegExp('(?<![A-Za-zА-Яа-яЁё0-9_])'+escRe(k)+'(?![A-Za-zА-Яа-яЁё0-9_])','g'),v);
    });
    return Function('"use strict";return('+e+')')();
  }catch(ex){return null;}
}
function chkRule(r,scope){
  const v=scope[r.var];if(v===undefined)return false;
  const t=parseFloat(r.val);
  return r.op==='<'?v<t:r.op==='<='?v<=t:r.op==='>'?v>t:r.op==='>='?v>=t:r.op==='=='?v==t:r.op==='!='?v!=t:false;
}
function chkBlock(b,scope){
  if(!b.rules||!b.rules.length)return false;
  const res=b.rules.map(r=>chkRule(r,scope));
  return b.logic==='AND'?res.every(Boolean):res.some(Boolean);
}

// ─── RUN — ALL formulas execute in sequence ───
function runCalc(userValues){
  const scope={};
  fields.forEach(f=>{
    if(f.ftype==='input'&&f.alias)scope[f.alias]=parseFloat(userValues[f.id])||0;
    if(f.ftype==='select'&&f.alias)scope[f.alias]=parseFloat(userValues[f.id])||0;
    if(f.ftype==='checkbox'&&f.alias)scope[f.alias]=userValues[f.id]?parseFloat(f.value)||0:0;
  });
  consts.forEach(c=>{if(c.alias)scope[c.alias]=c.value;});
  const trace=[];
  let lastResult=null,lastSaveAs='Результат';
  chain.forEach((b,i)=>{
    if(b.type==='condition'){
      const ok=chkBlock(b,scope);
      const condLabel=b.rules.map(r=>`${r.var} ${r.op} ${r.val}`).join(b.logic==='AND'?' И ':' ИЛИ ');
      if(ok){
        const res=evalF(b.formula,scope);
        if(b.saveAs&&res!==null)scope[b.saveAs]=res;
        trace.push({step:i+1,type:'condition',condLabel,ok,formula:b.formula,result:res,saveAs:b.saveAs});
        if(res!==null){lastResult=res;if(b.saveAs)lastSaveAs=b.saveAs;}
      } else {
        trace.push({step:i+1,type:'condition',condLabel,ok,formula:b.formula,result:null,saveAs:b.saveAs});
      }
    } else {
      const res=evalF(b.formula,scope);
      if(b.saveAs&&res!==null)scope[b.saveAs]=res;
      trace.push({step:i+1,type:'formula',condLabel:'',ok:true,formula:b.formula,result:res,saveAs:b.saveAs});
      if(res!==null){lastResult=res;if(b.saveAs)lastSaveAs=b.saveAs;}
    }
  });
  return{result:lastResult,saveAs:lastSaveAs,trace};
}

// ─── field management ───
function addField(ftype){
  const base={id:nid(),ftype};
  if(ftype==='heading')base.label='Новый раздел';
  else if(ftype==='input'){base.label='';base.alias='';base.itype='number';base.placeholder='';base.hint='';base.required=true;}
  else if(ftype==='checkbox'){base.label='';base.alias='';base.value='1';base.hint='';base.checked=false;}
  else if(ftype==='select'){base.label='';base.alias='';base.hint='';base.required=true;base.options=[{id:nid(),label:'Вариант 1',value:'1'}];}
  else if(ftype==='text'){base.content='';base.ttype='info';}
  fields.push(base);renderBuilder();
}
function removeField(id){fields=fields.filter(f=>f.id!==id);renderBuilder();}
function moveField(id,dir){
  const i=fields.findIndex(f=>f.id===id);
  if(dir===-1&&i===0||dir===1&&i===fields.length-1)return;
  const a=[...fields];[a[i],a[i+dir]]=[a[i+dir],a[i]];fields=a;renderBuilder();
}
function addOption(fid){const f=fields.find(f=>f.id===fid);if(f)f.options.push({id:nid(),label:'',value:'1'});renderBuilder();}
function removeOption(fid,oid){const f=fields.find(f=>f.id===fid);if(f)f.options=f.options.filter(o=>o.id!==oid);renderBuilder();}
function addConst(){consts.push({id:nid(),name:'',alias:'',value:0});renderBuilder();}
function removeConst(id){consts=consts.filter(c=>c.id!==id);renderBuilder();}
function addChainBlock(type){
  if(type==='condition')chain.push({id:nid(),type:'condition',logic:'AND',rules:[{id:nid(),var:'',op:'<',val:''}],formula:'',saveAs:''});
  else chain.push({id:nid(),type:'formula',formula:'',saveAs:''});
  renderBuilder();
}
function removeChainBlock(id){chain=chain.filter(b=>b.id!==id);renderBuilder();}
function moveChainBlock(id,dir){
  const i=chain.findIndex(b=>b.id===id);
  if(dir===-1&&i===0||dir===1&&i===chain.length-1)return;
  const a=[...chain];[a[i],a[i+dir]]=[a[i+dir],a[i]];chain=a;renderBuilder();
}
function addRule(bid){const b=chain.find(b=>b.id===bid);if(b)b.rules.push({id:nid(),var:'',op:'<',val:''});renderBuilder();}
function removeRule(bid,rid){const b=chain.find(b=>b.id===bid);if(b)b.rules=b.rules.filter(r=>r.id!==rid);renderBuilder();}

// ─── RENDER BUILDER ───
function renderBuilder(){
  const el=document.getElementById('v-builder');

  const fieldHtml=fields.map((f,fi)=>{
    const isFirst=fi===0,isLast=fi===fields.length-1;
    const mv=`<button class="btn btn-ghost btn-sm" onclick="moveField('${f.id}',-1)"${isFirst?' disabled':''}>↑</button>
      <button class="btn btn-ghost btn-sm" onclick="moveField('${f.id}',1)"${isLast?' disabled':''}>↓</button>`;

    if(f.ftype==='heading') return`<div class="block" style="border-left:3px solid var(--color-border-info);">
      <div class="block-header"><span class="tag tag-info">Заголовок</span><div style="display:flex;gap:4px;">${mv}<button class="btn btn-danger btn-sm" onclick="removeField('${f.id}')">✕</button></div></div>
      <input id="f_${f.id}" type="text" value="${f.label}" placeholder="Название раздела" oninput="collect()">
    </div>`;

    if(f.ftype==='input') return`<div class="block">
      <div class="block-header"><span class="tag tag-teal">Инпут</span><div style="display:flex;gap:4px;">${mv}<button class="btn btn-danger btn-sm" onclick="removeField('${f.id}')">✕</button></div></div>
      <div class="field-row g3" style="margin-bottom:6px;">
        <div><div class="flbl">Название</div><input id="fl_${f.id}" type="text" value="${f.label}" placeholder="Название" oninput="collect()"></div>
        <div><div class="flbl">Alias</div><input id="fa_${f.id}" type="text" value="${f.alias}" placeholder="W" maxlength="12" style="font-family:var(--font-mono);" oninput="collect()"></div>
        <div><div class="flbl">Тип</div><select id="ft_${f.id}" onchange="collect()"><option value="number"${f.itype==='number'?' selected':''}>Число</option><option value="text"${f.itype==='text'?' selected':''}>Текст</option></select></div>
      </div>
      <div class="field-row g2">
        <div><div class="flbl">Placeholder</div><input id="fp_${f.id}" type="text" value="${f.placeholder}" placeholder="Введите..." oninput="collect()"></div>
        <div><div class="flbl">Подсказка / ед.изм.</div><input id="fh_${f.id}" type="text" value="${f.hint}" placeholder="мм, шт..." oninput="collect()"></div>
      </div>
    </div>`;

    if(f.ftype==='checkbox') return`<div class="block">
      <div class="block-header"><span class="tag tag-purple">Чекбокс</span><div style="display:flex;gap:4px;">${mv}<button class="btn btn-danger btn-sm" onclick="removeField('${f.id}')">✕</button></div></div>
      <div class="field-row g4">
        <div><div class="flbl">Название</div><input id="fl_${f.id}" type="text" value="${f.label}" placeholder="Название" oninput="collect()"></div>
        <div><div class="flbl">Alias</div><input id="fa_${f.id}" type="text" value="${f.alias}" maxlength="12" placeholder="CBX" style="font-family:var(--font-mono);" oninput="collect()"></div>
        <div><div class="flbl">Подсказка</div><input id="fh_${f.id}" type="text" value="${f.hint}" placeholder="Доп. коэф." oninput="collect()"></div>
        <div><div class="flbl">Значение ✓</div><input id="fv_${f.id}" type="text" value="${f.value}" placeholder="1" oninput="collect()"></div>
      </div>
    </div>`;

    if(f.ftype==='select'){
      const optsHtml=f.options.map(o=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;">
        <input id="ol_${o.id}" type="text" value="${o.label}" placeholder="Название" style="flex:2;" oninput="collect()">
        <input id="ov_${o.id}" type="text" value="${o.value}" placeholder="1.0" style="width:70px;font-family:var(--font-mono);" oninput="collect()">
        ${f.options.length>1?`<button class="btn btn-danger btn-sm" onclick="removeOption('${f.id}','${o.id}')">✕</button>`:''}
      </div>`).join('');
      return`<div class="block">
        <div class="block-header"><span class="tag tag-coral">Селект</span><div style="display:flex;gap:4px;">${mv}<button class="btn btn-danger btn-sm" onclick="removeField('${f.id}')">✕</button></div></div>
        <div class="field-row g3" style="margin-bottom:8px;">
          <div><div class="flbl">Название</div><input id="fl_${f.id}" type="text" value="${f.label}" placeholder="Материал" oninput="collect()"></div>
          <div><div class="flbl">Alias</div><input id="fa_${f.id}" type="text" value="${f.alias}" maxlength="12" placeholder="MAT" style="font-family:var(--font-mono);" oninput="collect()"></div>
          <div><div class="flbl">Подсказка</div><input id="fh_${f.id}" type="text" value="${f.hint}" placeholder="..." oninput="collect()"></div>
        </div>
        <div class="flbl">Варианты (название → числовое значение alias)</div>
        ${optsHtml}
        <button class="btn btn-sm" style="margin-top:4px;" onclick="addOption('${f.id}')">+ вариант</button>
      </div>`;
    }

    if(f.ftype==='text') return`<div class="block">
      <div class="block-header"><span class="tag tag-gray">Текст / заметка</span><div style="display:flex;gap:4px;">${mv}<button class="btn btn-danger btn-sm" onclick="removeField('${f.id}')">✕</button></div></div>
      <div class="field-row g2" style="margin-bottom:6px;">
        <div><div class="flbl">Тип</div><select id="ftt_${f.id}" onchange="collect()">
          <option value="info"${f.ttype==='info'?' selected':''}>Инфо</option>
          <option value="warn"${f.ttype==='warn'?' selected':''}>Предупреждение</option>
          <option value="success"${f.ttype==='success'?' selected':''}>Совет</option>
          <option value="tip"${f.ttype==='tip'?' selected':''}>Подсказка</option>
        </select></div>
        <div style="display:flex;align-items:flex-end;"><div style="width:100%;"><div class="flbl">Текст</div><input id="fc_${f.id}" type="text" value="${f.content}" placeholder="Текст заметки..." oninput="collect()"></div></div>
      </div>
    </div>`;
    return'';
  }).join('');

  const chainHtml=chain.map((b,i)=>{
    const isF=i===0,isL=i===chain.length-1;
    const mv=`<button class="btn btn-ghost btn-sm" onclick="moveChainBlock('${b.id}',-1)"${isF?' disabled':''}>↑</button>
      <button class="btn btn-ghost btn-sm" onclick="moveChainBlock('${b.id}',1)"${isL?' disabled':''}>↓</button>`;
    const saveRow=`<div class="save-row"><span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;">Сохранить как:</span>
      <input id="sa_${b.id}" type="text" value="${b.saveAs||''}" placeholder="необязательно" style="flex:1;font-family:var(--font-mono);font-size:12px;" oninput="collect()"></div>`;
    if(b.type==='condition'){
      const rulesHtml=b.rules.map((r,ri)=>`<div class="rule-row">
        ${ri===0?'<span style="font-size:12px;color:var(--color-text-secondary);width:34px;">Если</span>'
          :`<select id="lg_${b.id}" style="width:58px;" onchange="collect()"><option value="AND"${b.logic==='AND'?' selected':''}>И</option><option value="OR"${b.logic==='OR'?' selected':''}>ИЛИ</option></select>`}
        <select id="rv_${r.id}" style="min-width:90px;width:auto;" onchange="collect()">${aliasOpts(r.var,i)}</select>
        <select id="ro_${r.id}" style="width:58px;flex-shrink:0;" onchange="collect()">
          ${['<','<=','>','>=','==','!='].map(op=>`<option${r.op===op?' selected':''}>${op}</option>`).join('')}
        </select>
        <input id="rt_${r.id}" type="text" value="${r.val}" placeholder="10" style="width:64px;flex-shrink:0;" oninput="collect()">
        ${b.rules.length>1?`<button class="btn btn-danger btn-sm" onclick="removeRule('${b.id}','${r.id}')">✕</button>`:''}
      </div>`).join('');
      return`<div class="block">
        <div class="block-header"><span class="tag tag-info">Условие ${i+1}</span>
          <div style="display:flex;gap:4px;">${mv}<button class="btn btn-sm" onclick="addRule('${b.id}')">+ правило</button><button class="btn btn-danger btn-sm" onclick="removeChainBlock('${b.id}')">✕</button></div></div>
        ${rulesHtml}
        <div class="divider"></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;">→</span>
          <input id="bf_${b.id}" type="text" value="${b.formula}" placeholder="(W*H/1000000)*BASE*MAT*V" style="font-family:var(--font-mono);" oninput="collect()">
        </div>${saveRow}</div>`;
    } else {
      return`<div class="block" style="border-left:3px solid var(--color-border-tertiary);">
        <div class="block-header"><span class="tag tag-gray">Формула ${i+1} (всегда)</span>
          <div style="display:flex;gap:4px;">${mv}<button class="btn btn-danger btn-sm" onclick="removeChainBlock('${b.id}')">✕</button></div></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;">→</span>
          <input id="bf_${b.id}" type="text" value="${b.formula}" placeholder="PRICE*1.2" style="font-family:var(--font-mono);" oninput="collect()">
        </div>${saveRow}</div>`;
    }
  }).join('<div style="font-size:11px;color:var(--color-text-secondary);padding:2px 0 4px 6px;">↓ следующий шаг</div>');

  el.innerHTML=`
  <div class="card">
    <span class="lbl">Настройки</span>
    <div class="field-row g2">
      <div><div class="flbl">Название калькулятора</div><input id="m-name" value="${meta.name}" oninput="collect()"></div>
      <div><div class="flbl">Описание</div><input id="m-desc" value="${meta.desc}" oninput="collect()"></div>
    </div>
  </div>
  <div class="card">
    <span class="lbl">Поля калькулятора</span>
    ${fieldHtml}
    <div class="add-menu">
      <span style="font-size:11px;color:var(--color-text-secondary);padding:5px 0;">Добавить:</span>
      <button class="btn btn-sm" onclick="addField('heading')">+ Заголовок</button>
      <button class="btn btn-sm" onclick="addField('input')">+ Инпут</button>
      <button class="btn btn-sm" onclick="addField('checkbox')">+ Чекбокс</button>
      <button class="btn btn-sm" onclick="addField('select')">+ Селект</button>
      <button class="btn btn-sm" onclick="addField('text')">+ Заметка</button>
    </div>
  </div>
  <div class="card">
    <span class="lbl">Константы</span>
    ${consts.map(c=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
      <input id="cn_${c.id}" type="text" value="${c.name}" placeholder="Название" style="flex:2;" oninput="collect()">
      <input id="cv_${c.id}" type="number" value="${c.value}" style="width:80px;flex-shrink:0;" oninput="collect()">
      <span class="tag tag-gray"><input id="ca_${c.id}" type="text" maxlength="10" value="${c.alias}" placeholder="A" style="background:transparent;border:none;outline:none;width:50px;font-size:11px;font-weight:500;text-align:center;padding:0;color:var(--color-text-secondary);" oninput="collect()"></span>
      <button class="btn btn-danger btn-sm" onclick="removeConst('${c.id}')">✕</button>
    </div>`).join('')}
    <button class="btn btn-sm" onclick="addConst()">+ Константа</button>
  </div>
  <div class="card">
    <span class="lbl">Цепочка расчётов</span>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;">Все шаги выполняются по очереди. Условные — только если условие совпадает. Формулы без условия — всегда.</p>
    ${chainHtml}
    <div class="add-menu">
      <button class="btn btn-sm" onclick="addChainBlock('condition')">+ Условие + формула</button>
      <button class="btn btn-sm" onclick="addChainBlock('formula')">+ Формула (всегда)</button>
    </div>
  </div>
  <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:4px;">
    <button class="btn btn-success" onclick="go('preview')">Превью →</button>
    <button class="btn btn-primary" onclick="go('json')">JSON →</button>
  </div>`;
}

// ─── RENDER PREVIEW ───
function renderPreview(){
  const el=document.getElementById('v-preview');
  const userValues={};
  let formHtml='';
  fields.forEach(f=>{
    if(f.ftype==='heading'){
      formHtml+=`<div class="p-heading">${f.label}</div>`;
    } else if(f.ftype==='input'){
      formHtml+=`<div class="p-field">
        <label>${f.label}${f.required?'<span style="color:var(--color-text-danger)"> *</span>':''}</label>
        ${f.hint?`<div class="hint">${f.hint}</div>`:''}
        <input id="pi_${f.id}" type="${f.itype||'number'}" placeholder="${f.placeholder}" oninput="calcPreview()">
      </div>`;
    } else if(f.ftype==='checkbox'){
      formHtml+=`<div class="p-field">
        <div class="p-checkbox" onclick="document.getElementById('pc_${f.id}').click();calcPreview()">
          <input id="pc_${f.id}" type="checkbox" onclick="event.stopPropagation();calcPreview()">
          <label>${f.label}</label>
          ${f.hint?`<span style="font-size:11px;color:var(--color-text-secondary);margin-left:auto;">${f.hint}</span>`:''}
        </div>
      </div>`;
    } else if(f.ftype==='select'){
      formHtml+=`<div class="p-field">
        <label>${f.label}${f.required?'<span style="color:var(--color-text-danger)"> *</span>':''}</label>
        ${f.hint?`<div class="hint">${f.hint}</div>`:''}
        <select id="ps_${f.id}" onchange="calcPreview()">
          ${f.options.map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}
        </select>
      </div>`;
    } else if(f.ftype==='text'){
      const cls={info:'p-note-info',warn:'p-note-warn',success:'p-note-success',tip:'p-note-tip'}[f.ttype]||'p-note-info';
      formHtml+=`<div class="p-note ${cls}">${f.content}</div>`;
    }
  });

  el.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;">
    <div class="card">
      <div style="font-size:16px;font-weight:500;margin-bottom:4px;">${meta.name}</div>
      ${meta.desc?`<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px;">${meta.desc}</div>`:''}
      <div class="divider"></div>
      <div style="margin-top:12px;">${formHtml}</div>
      <button class="btn btn-primary" style="width:100%;padding:9px;margin-top:8px;" onclick="calcPreview()">Рассчитать</button>
    </div>
    <div>
      <div class="card" id="result-card">
        <div style="text-align:center;padding:1rem 0;">
          <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;">Итоговая стоимость</div>
          <div style="font-size:32px;font-weight:500;" id="r-value">—</div>
        </div>
        <div id="r-trace"></div>
      </div>
    </div>
  </div>
  <div style="margin-top:.5rem;text-align:right;"><button class="btn btn-ghost" onclick="go('builder')">← Конструктор</button></div>`;
}

function calcPreview(){
  const uv={};
  fields.forEach(f=>{
    if(f.ftype==='input'){const el=document.getElementById('pi_'+f.id);if(el)uv[f.id]=el.value;}
    else if(f.ftype==='select'){const el=document.getElementById('ps_'+f.id);if(el)uv[f.id]=el.value;}
    else if(f.ftype==='checkbox'){const el=document.getElementById('pc_'+f.id);if(el)uv[f.id]=el.checked;}
  });
  const{result,saveAs,trace}=runCalc(uv);
  const rv=document.getElementById('r-value'),rt=document.getElementById('r-trace');
  if(!rv)return;
  rv.textContent=result!==null?result.toFixed(2)+' ₽':'—';
  const traceHtml=trace.map(t=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;">
    <span class="tag ${t.ok?'tag-success':'tag-gray'}" style="font-size:10px;">Шаг ${t.step}</span>
    ${t.type==='condition'?`<span style="font-size:11px;color:var(--color-text-secondary);">${t.condLabel}</span>`:''}
    ${t.ok&&t.result!==null?`<span class="mono" style="color:var(--color-text-secondary);">${t.formula} = ${t.result.toFixed(2)}</span>
      ${t.saveAs?`<span class="scope-pill">→ ${t.saveAs}</span>`:''}`:
      t.ok===false?'<span style="font-size:11px;color:var(--color-text-secondary);">пропущен</span>':''}
  </div>`).join('');
  rt.innerHTML=trace.length?`<div class="divider"></div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;">Трассировка</div>${traceHtml}`:'';
}

// ─── RENDER JSON ───
function renderJson(){
  collect();
  const cfg={id:'calc_001',name:meta.name,description:meta.desc,
    fields:fields.map(f=>{
      if(f.ftype==='heading')return{type:'heading',label:f.label};
      if(f.ftype==='input')return{type:'input',label:f.label,alias:f.alias,inputType:f.itype,placeholder:f.placeholder,hint:f.hint,required:f.required};
      if(f.ftype==='checkbox')return{type:'checkbox',label:f.label,alias:f.alias,value:f.value,hint:f.hint};
      if(f.ftype==='select')return{type:'select',label:f.label,alias:f.alias,hint:f.hint,options:f.options.map(o=>({label:o.label,value:o.value}))};
      if(f.ftype==='text')return{type:'text',textType:f.ttype,content:f.content};
      return f;
    }),
    constants:consts.map(c=>({name:c.name,alias:c.alias,value:c.value})),
    chain:chain.map(b=>{
      const r={type:b.type,formula:b.formula,saveAs:b.saveAs||null};
      if(b.type==='condition'){r.logic=b.logic;r.rules=b.rules.map(r2=>({variable:r2.var,operator:r2.op,value:parseFloat(r2.val)||r2.val}));}
      return r;
    })
  };
  const jStr=JSON.stringify(cfg,null,2);
  const calcReq=`POST /api/calculators/{id}/calculate\n{\n  "inputs": {\n${fields.filter(f=>['input','select','checkbox'].includes(f.ftype)&&f.alias).map(f=>`    "${f.alias}": <значение>`).join(',\n')}\n  }\n}`;
  document.getElementById('v-json').innerHTML=`
  <div class="card"><span class="lbl">Сохранение (POST /api/calculators)</span><div class="json-out">${jStr}</div></div>
  <div class="card"><span class="lbl">Запрос расчёта</span><div class="json-out">${calcReq}</div></div>
  <div style="display:flex;justify-content:space-between;padding-top:4px;">
    <button class="btn btn-ghost" onclick="go('builder')">← Конструктор</button>
    <button class="btn btn-primary" onclick="navigator.clipboard.writeText(${JSON.stringify(jStr)})">Скопировать JSON</button>
  </div>`;
}

renderBuilder();
</script>
