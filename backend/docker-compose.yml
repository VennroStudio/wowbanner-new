name: wowbanner-new

services:
  nginx:
    container_name: api-wowbanner-nginx
    build:
      context: docker
      dockerfile: development/nginx/Dockerfile
    volumes:
      - ./:/app
    networks:
      - proxy

  php-fpm:
    container_name: api-wowbanner-php-fpm
    build:
      context: docker
      dockerfile: development/php-fpm/Dockerfile
    env_file: .env
    volumes:
      - ./:/app
      - ./auth.json:/root/.composer/auth.json
    networks:
      - proxy

  php-cli:
    container_name: api-wowbanner-php-cli
    build:
      context: docker
      dockerfile: development/php-cli/Dockerfile
    env_file: .env
    volumes:
      - ./:/app
      - ./auth.json:/root/.composer/auth.json
    networks:
      - proxy

networks:
  proxy:
    external: true
